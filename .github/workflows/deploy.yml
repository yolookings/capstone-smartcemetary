name: Smart Cemetery CI/CD

on:
  push:
    branches:
      - dev
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AI_MODEL: "nvidia/llama-3.1-nemotron-70b-instruct:free"
  AI_FALLBACK_MODEL: "meta-llama/llama-3.2-3b-instruct:free"
  AI_TIMEOUT_MS: "50000"
  NEXT_PUBLIC_SUPABASE_URL: "https://lzkujbjnculnffpsnjke.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6a3VqYmpuY3VsbmZmcHNuamtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MTg0NDQsImV4cCI6MjA5MTE5NDQ0NH0.9qgqx1xgtLZZTBBG5h827WEiYcFUH7UMEtMMx57zXCY"
  SUPABASE_SERVICE_ROLE_KEY: "mock-service-role-key"
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
  NEXTAUTH_SECRET: "mock-nextauth-secret-key-32-characters"
  NEXTAUTH_URL: "https://smartcemetary.web.id/"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint || true

      - name: Type Check
        run: npx tsc --noEmit || true

      - name: Build
        run: npm run build

      - name: Smoke Test
        run: test -d .next

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Mengambil data dari Secrets GitHub sesuai dengan screenshot kamu
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_FALLBACK_MODEL: ${{ secrets.AI_FALLBACK_MODEL }}
          AI_TIMEOUT_MS: ${{ secrets.AI_TIMEOUT_MS }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
          OPENROUTER_API_URL: ${{ secrets.OPENROUTER_API_URL }}
          KIRIMDEV_API_KEY: ${{ secrets.KIRIMDEV_API_KEY }}
          KIRIMDEV_PHONE_NUMBER_ID: ${{ secrets.KIRIMDEV_PHONE_NUMBER_ID }}
          ADMIN_WHATSAPP_NUMBER: ${{ secrets.ADMIN_WHATSAPP_NUMBER }}

          # Mengambil data dari Env Global (bagian atas file ini)
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ env.NEXTAUTH_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Mendaftarkan semua variabel agar bisa dibaca di dalam blok script VPS
          envs: AI_MODEL,AI_FALLBACK_MODEL,AI_TIMEOUT_MS,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY,DATABASE_URL,NEXTAUTH_SECRET,NEXTAUTH_URL,FONNTE_TOKEN,OPENROUTER_API_URL,KIRIMDEV_API_KEY,KIRIMDEV_PHONE_NUMBER_ID,ADMIN_WHATSAPP_NUMBER
          script: |
            cd ~/capstone-smartcemetary

            # 1. Pull terbaru sesuai branch yang di-push
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            # 2. Membuat & Memperbarui file .env secara otomatis di VPS
            echo "AI_MODEL=${AI_MODEL}" > .env
            echo "AI_FALLBACK_MODEL=${AI_FALLBACK_MODEL}" >> .env
            echo "AI_TIMEOUT_MS=${AI_TIMEOUT_MS}" >> .env
            echo "NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}" >> .env
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}" >> .env
            echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}" >> .env
            echo "DATABASE_URL=${DATABASE_URL}" >> .env
            echo "NEXTAUTH_SECRET=${NEXTAUTH_SECRET}" >> .env
            echo "NEXTAUTH_URL=${NEXTAUTH_URL}" >> .env
            echo "FONNTE_TOKEN=${FONNTE_TOKEN}" >> .env
            echo "OPENROUTER_API_URL=${OPENROUTER_API_URL}" >> .env
            echo "KIRIMDEV_API_KEY=${KIRIMDEV_API_KEY}" >> .env
            echo "KIRIMDEV_PHONE_NUMBER_ID=${KIRIMDEV_PHONE_NUMBER_ID}" >> .env
            echo "ADMIN_WHATSAPP_NUMBER=${ADMIN_WHATSAPP_NUMBER}" >> .env

            # 3. Install dan build ulang di VPS
            npm install
            npm run build

            # 4. Dinamis Port & Nama PM2 berdasarkan branch
            if [ "${{ github.ref_name }}" = "main" ]; then
              PM2_APP="smartcemetary"
              PORT=3000
            else
              PM2_APP="smartcemetary-staging"
              PORT=3001
            fi

            # 5. Jalankan atau restart aplikasi via PM2
            if pm2 list | grep -q "$PM2_APP"; then
              echo "Aplikasi '$PM2_APP' sedang berjalan. Melakukan restart..."
              pm2 restart "$PM2_APP"
            else
              echo "Aplikasi '$PM2_APP' tidak ditemukan. Menjalankan proses PM2 baru di port $PORT..."
              PORT=$PORT pm2 start npm --name "$PM2_APP" -- run start
            fi

            pm2 save
